name: Deploy site (GitHub Pages)

# Builds the Lily UI brand site (apps/docs) at the root and the Storybook
# catalog (apps/storybook) under /storybook/, then publishes the combined output
# to GitHub Pages as a single artifact. Pages must be enabled with
# "Source: GitHub Actions" in the repository settings for the deploy to succeed.

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'apps/storybook/**'
      - 'packages/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://sueish-llc.github.io
      BASE_PATH: /lily-ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Provision/validate the Pages site for Actions deployments. Without
      # this, the deploy step can fail with 401 until the site has been
      # initialized once for the "GitHub Actions" source.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build brand site + Storybook into dist-pages
        run: pnpm build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist-pages

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
