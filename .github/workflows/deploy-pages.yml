name: Deploy site (GitHub Pages)

# Builds the Lily UI brand site (apps/docs) at the root and the Storybook
# catalog (apps/storybook) under /storybook/, then publishes the combined output
# to GitHub Pages as a single artifact. Pages must be enabled with
# "Source: GitHub Actions" in the repository settings for the deploy to succeed.

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'apps/storybook/**'
      - 'packages/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://sueish-llc.github.io
      BASE_PATH: /lily-ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Provision/validate the Pages site for Actions deployments. Without
      # this, the deploy step can fail with 401 until the site has been
      # initialized once for the "GitHub Actions" source.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build brand site + Storybook into dist-pages
        run: pnpm build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist-pages

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
